<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — SecureGov</title>
  <meta name="description" content="Your SecureGov document management dashboard.">
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

<!-- Mobile sidebar overlay -->
<div class="sidebar-overlay" id="sidebarOverlay"></div>

<div class="app-layout">

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <a href="dashboard.html" class="sidebar-logo">
      <i class="fas fa-shield-alt"></i>
      SecureGov
    </a>
    <nav class="sidebar-nav">
      <a href="dashboard.html"  class="nav-link active"><i class="fas fa-home"></i> Dashboard</a>
      <a href="documents.html"  class="nav-link"><i class="fas fa-folder-open"></i> Documents</a>
      <a href="family.html"     class="nav-link"><i class="fas fa-users"></i> Family</a>
      <a href="profile.html"    class="nav-link"><i class="fas fa-user"></i> Profile</a>
    </nav>
    <div class="sidebar-footer">
      <div class="sidebar-user">
        <div class="user-avatar" id="sidebarUserAvatar">?</div>
        <div class="user-info">
          <div class="user-name"  id="sidebarUserName">Loading…</div>
          <div class="user-email" id="sidebarUserEmail"></div>
        </div>
      </div>
      <button class="btn btn-danger-outline btn-sm w-full" id="logoutBtn">
        <i class="fas fa-sign-out-alt"></i> Sign Out
      </button>
    </div>
  </aside>

  <!-- Main -->
  <div class="main-content">
    <div class="top-bar">
      <button class="mobile-menu-btn" id="mobileMenuBtn" aria-label="Open menu">
        <i class="fas fa-bars"></i>
      </button>
      <span class="top-bar-title">Dashboard</span>
      <div class="top-bar-actions">
        <button class="theme-toggle" id="themeToggle" title="Toggle theme">
          <i class="fas fa-sun"></i>
        </button>
      </div>
    </div>

    <div class="page-body">
      <!-- Welcome -->
      <div class="page-header">
        <div>
          <h1 class="page-title" id="welcomeMsg">Welcome back</h1>
          <p class="page-subtitle">Here's an overview of your account</p>
        </div>
        <a href="documents.html" class="btn btn-primary">
          <i class="fas fa-upload"></i> Upload Document
        </a>
      </div>

      <!-- Stats -->
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-icon"><i class="fas fa-file-alt"></i></div>
          <div class="stat-label">My Documents</div>
          <div class="stat-value" id="statDocs">—</div>
        </div>
        <div class="stat-card">
          <div class="stat-icon"><i class="fas fa-share-alt"></i></div>
          <div class="stat-label">Shared With Me</div>
          <div class="stat-value" id="statShared">—</div>
        </div>
        <div class="stat-card">
          <div class="stat-icon"><i class="fas fa-users"></i></div>
          <div class="stat-label">Family Members</div>
          <div class="stat-value" id="statFamily">—</div>
        </div>
        <div class="stat-card">
          <div class="stat-icon"><i class="fas fa-database"></i></div>
          <div class="stat-label">Storage Used</div>
          <div class="stat-value" id="statStorage">—</div>
        </div>
      </div>

      <!-- Recent Documents -->
      <div class="card">
        <div class="card-header">
          <span class="card-title">Recent Documents</span>
          <a href="documents.html" class="btn btn-ghost btn-sm">View all</a>
        </div>
        <div id="recentDocsList">
          <div class="empty-state" style="padding:32px 0;">
            <span class="spinner"></span>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<div id="toastContainer" class="toast-container"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/9.23.0/firebase-app-compat.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/9.23.0/firebase-auth-compat.min.js"></script>
<script src="../js/firebase-init.js"></script>
<script src="../js/config.js"></script>
<script src="../js/utils.js"></script>
<script src="../js/dashboard.js"></script>
</body>
</html>
