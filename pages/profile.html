<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile — SecureGov</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

<div class="sidebar-overlay" id="sidebarOverlay"></div>

<div class="app-layout">
  <aside class="sidebar" id="sidebar">
    <a href="dashboard.html" class="sidebar-logo">
      <i class="fas fa-shield-alt"></i> SecureGov
    </a>
    <nav class="sidebar-nav">
      <a href="dashboard.html"  class="nav-link"><i class="fas fa-home"></i> Dashboard</a>
      <a href="documents.html"  class="nav-link"><i class="fas fa-folder-open"></i> Documents</a>
      <a href="family.html"     class="nav-link"><i class="fas fa-users"></i> Family</a>
      <a href="profile.html"    class="nav-link active"><i class="fas fa-user"></i> Profile</a>
    </nav>
    <div class="sidebar-footer">
      <div class="sidebar-user">
        <div class="user-avatar" id="sidebarUserAvatar">?</div>
        <div class="user-info">
          <div class="user-name"  id="sidebarUserName">—</div>
          <div class="user-email" id="sidebarUserEmail"></div>
        </div>
      </div>
      <button class="btn btn-danger-outline btn-sm w-full" id="logoutBtn">
        <i class="fas fa-sign-out-alt"></i> Sign Out
      </button>
    </div>
  </aside>

  <div class="main-content">
    <div class="top-bar">
      <button class="mobile-menu-btn" id="mobileMenuBtn"><i class="fas fa-bars"></i></button>
      <span class="top-bar-title">Profile</span>
      <div class="top-bar-actions">
        <button class="theme-toggle" id="themeToggle"><i class="fas fa-sun"></i></button>
      </div>
    </div>

    <div class="page-body" style="max-width:640px;">
      <h1 class="page-title" style="margin-bottom:24px;">Your Profile</h1>

      <!-- Avatar section -->
      <div class="profile-avatar-wrap">
        <div class="profile-avatar" id="profileAvatar">?</div>
        <div class="profile-info-meta">
          <div class="profile-display-name" id="profileName">—</div>
          <div class="profile-email" id="profileEmail">—</div>
          <div class="profile-joined" id="profileJoined"></div>
        </div>
      </div>

      <!-- Email verified notice -->
      <div id="emailVerifiedBadge" class="alert alert-success mb-4" style="display:none;">
        <i class="fas fa-check-circle"></i>
        Email address verified
      </div>
      <div id="emailUnverifiedBadge" class="alert alert-warning mb-4" style="display:none;">
        <i class="fas fa-exclamation-triangle"></i>
        Email not yet verified — check your inbox
      </div>

      <!-- Profile form -->
      <div class="card">
        <div class="card-header">
          <span class="card-title">Personal Details</span>
        </div>
        <form id="profileForm" novalidate>
          <div class="modal-body" style="gap:16px;">

            <div class="form-group">
              <label for="profileNameInput">Full Name</label>
              <input type="text" id="profileNameInput" name="name" class="form-control"
                     placeholder="Priya Sharma" autocomplete="name">
            </div>

            <div class="form-group">
              <label for="profileEmailInput">Email Address</label>
              <input type="email" id="profileEmailInput" class="form-control"
                     readonly disabled>
              <span class="form-hint">Email cannot be changed here.</span>
            </div>

            <div class="form-group">
              <label for="profilePhone">Phone Number</label>
              <input type="tel" id="profilePhone" name="phone" class="form-control"
                     placeholder="+91 98765 43210" autocomplete="tel">
            </div>

            <div class="form-group">
              <label for="profileAddress">Address</label>
              <textarea id="profileAddress" name="address" class="form-control"
                        placeholder="Your home address" rows="3" autocomplete="street-address"></textarea>
            </div>

          </div>

          <div style="margin-top:24px;display:flex;justify-content:flex-end;gap:12px;">
            <button type="button" class="btn btn-secondary" onclick="loadProfile()">
              <i class="fas fa-undo"></i> Reset
            </button>
            <button type="submit" class="btn btn-primary" id="saveProfileBtn">
              <i class="fas fa-save"></i> Save Changes
            </button>
          </div>
        </form>
      </div>

      <!-- Danger zone -->
      <div class="card" style="margin-top:24px;border-color:var(--danger);">
        <div class="card-header">
          <span class="card-title text-danger">Account</span>
        </div>
        <div class="flex items-center justify-between flex-wrap gap-3">
          <div>
            <div class="font-medium text-sm">Sign out of all devices</div>
            <div class="text-xs text-muted mt-2">You will be redirected to the login page.</div>
          </div>
          <button class="btn btn-danger btn-sm" id="logoutBtn2">
            <i class="fas fa-sign-out-alt"></i> Sign Out
          </button>
        </div>
      </div>

    </div>
  </div>
</div>

<div id="toastContainer" class="toast-container"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/9.23.0/firebase-app-compat.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/9.23.0/firebase-auth-compat.min.js"></script>
<script src="../js/firebase-init.js"></script>
<script src="../js/config.js"></script>
<script src="../js/utils.js"></script>
<script src="../js/profile.js"></script>
</body>
</html>
